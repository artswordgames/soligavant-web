services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: soligavant
      POSTGRES_USER: soligavant_user
      POSTGRES_PASSWORD: soligavant_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/SoliGavant.Api/Dockerfile
    ports:
      - "5283:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=soligavant;Username=soligavant_user;Password=soligavant_dev_pass
    depends_on:
      - db

volumes:
  postgres_data:
